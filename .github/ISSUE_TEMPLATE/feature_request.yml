name: Feature Request
description: Suggest a new feature, gameplay mechanic, vehicle, weapon, or improvement
title: "[FEATURE]: "
labels:

* enhancement

body:

* type: textarea
  id: summary
  attributes:
  label: Feature Summary
  description: Briefly describe your idea.
  placeholder: What would you like to see added or improved?
  validations:
  required: true

* type: textarea
  id: problem
  attributes:
  label: Problem Statement
  description: What problem does this feature solve?
  placeholder: Explain why this feature is needed.
  validations:
  required: true

* type: textarea
  id: solution
  attributes:
  label: Proposed Solution
  description: Describe how you think the feature should work.
  placeholder: Explain your suggestion in detail.
  validations:
  required: true

* type: dropdown
  id: category
  attributes:
  label: Category
  options:
  - Gameplay
  - Balance
  - Vehicles
  - Weapons
  - Equipment
  - Factions
  - UI / UX
  - Logistics
  - Performance
  - Quality of Life
  - Other

* type: textarea
  id: examples
  attributes:
  label: Examples / References
  description: Include screenshots, videos, links, or examples from other games if applicable.

* type: textarea
  id: benefits
  attributes:
  label: Expected Benefits
  description: How would this improve the player experience?

* type: textarea
  id: additional
  attributes:
  label: Additional Information
  description: Anything else you would like to add?
