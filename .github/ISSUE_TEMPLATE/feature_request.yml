name: Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE]: "
labels:
  - enhancement

body:
  - type: textarea
    id: summary
    attributes:
      label: Feature Summary
      description: Briefly describe your idea.
      placeholder: What would you like to see added or improved?
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how the feature should work.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Gameplay
        - Balance
        - Vehicles
        - Weapons
        - Equipment
        - Factions
        - UI
        - Performance
        - Quality of Life
        - Other

  - type: textarea
    id: benefits
    attributes:
      label: Expected Benefits
      description: How would this improve the game?

  - type: textarea
    id: additional
    attributes:
      label: Additional Information
      description: Anything else you'd like to add?
